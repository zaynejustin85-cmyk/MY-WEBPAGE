<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    background: linear-gradient(135deg, #00171F, #00A7E1);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-card {
    background-color: #00171F;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 30px;
    border-radius: 10px;
    color: #ffffff;
    width: 100%;
    max-width: 400px;
}
    .text-warning {
         color: #00A7E1 !important; 
    }
    .btn-success {

         background-color: #00A7E1 !important; border-color: #00A7E1 !important; color: #ffffff !important; font-weight: bold; 
        }
    .btn-success:hover {
         background-color: #0086b3 !important;
         }
            
            
            
            
            </style>
                </head>
                <body>
                <div class="login-card">
                <h2 class="text-center mb-4">Login</h2>
                <form action="#" method="POST">

                    <div class="form-floating mb-3">
                    <input type="password" class="form-control form-control-lg text-dark" id="passwordInput" placeholder="Password" required>
                    <label for="passwordInput" class="text-dark">Password</label>
                    <div class="invalid-feedback text-warning fw-bold"></div>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100 btn-lg mt-2">Sign In</button>
                    <p class="text-center mt-3">Don't have an account? <a href="register.html" class="text-warning fw-bold">Register here</a></p>
                    <p class="text-center"><a href="index.html" class="text-warning fw-bold">back to home </a></p>

                </form>
                </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


    </body>
    </html>
