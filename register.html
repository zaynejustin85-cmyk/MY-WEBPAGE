<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
        body {
            background: linear-gradient(135deg, #00171F, #00A7E1);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .register-card {
            background-color: #00171F;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 10px;
            color: #ffffff;
            width: 100%;
            max-width: 600px;
        }
        .text-info, .text-warning { 
            color: #00A7E1 !important;
         }
        .btn-success { 
            background-color: #00A7E1 !important; border-color: #00A7E1 !important; color: #ffffff !important; font-weight: bold; 
        }
        .btn-success:hover { 
            background-color: #0086b3 !important;
         }
            </style>
        </head>
            <body>
    <div class="register-card">
<h2 class="text-center mb-4">Student Registration</h2>

<form action="#" method="POST" onsubmit="event.preventDefault();">

                <div class="row mb-3">
                <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Full Name" required>
           
           
           
            </div>
                <div class="col-md-6">
                <label class="form-label">Student LRN</label>
                <input type="text" class="form-control" placeholder="12-digit LRN" pattern="\d{12}" required>
                <div class="valid-feedback fw-bold text-info"></div>
                </div>
                </div>

    <div class="mb-3">
    <label class="form-label">Username Handle</label>
   <div class="input-group">
   <span class="input-group-text">@</span>
    <input type="text" class="form-control" placeholder="student.username" required>



    <span class="input-group-text">@deped.gov.ph</span>
        </div>



    </div>
        <div class="row mb-3">
                
            
            
            
            
            <div class="col-md-6">
                               <label class="form-label">Academic Track / Strand</label>
            <select class="form-select" required>
            <option value="" selected disabled>Choose strand...</option>
            <option value="ict">css-computer system services</option>
            <option value="stem">animation</option>
            <option value="abm">Web Development & Design</option>
           
        
        
        </select>
            </div>
            <div class="col-md-6">
            <label class="form-label d-block">Gender Profile</label>
            <div class="form-check form-check-inline mt-2">
            <input class="form-check-input" type="radio" name="gender" id="male" checked>
            <label class="form-check-label" for="male">Male</label>
            </div>
            <div class="form-check form-check-inline mt-2">
            <input class="form-check-input" type="radio" name="gender" id="female">
            <label class="form-check-label" for="female">Female</label>
            </div>
            </div>
            </div>

                <div class="row mb-3">
                <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Create password" required>
                </div>
                <div class="col-md-6">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" placeholder="Retype password" required>
                </div>
                </div>

            <div class="mb-4 form-check">
            <input class="form-check-input" type="checkbox" id="terms" checked required>
            <label class="form-check-label small text-white-50" for="terms">
            I agree to the digital Data Privacy Policy rules.
            </label>
            </div>
            <button type="submit" class="btn btn-success w-100 py-2">Submit Registration</button>
            </form>
            <p class="text-center mt-3">Already have an account? <a href="index.html" class="text-warning fw-bold">Login here</a></p>
            <p class="text-center"><a href="index.html" class="text-warning fw-bold">back to home </a></p>
            </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        

        </body>
        </html>
